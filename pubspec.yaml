name: ikong
description: "노인 건강 모니터링 및 응급 대응 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^15.1.2

  # 네트워크
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # WebSocket (실시간 생체 데이터)
  web_socket_channel: ^3.0.2

  # 로컬 저장소
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # 위치
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # 푸시 알림 (Firebase) - Firebase 설정 후 활성화
  # firebase_core: ^3.13.0
  # firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # 차트
  fl_chart: ^0.71.0

  # 권한
  permission_handler: ^11.4.0

  # 전화 걸기
  url_launcher: ^6.3.1

  # 이미지
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # 날짜/시간
  intl: ^0.20.2

  # JSON 직렬화
  json_annotation: ^4.9.0

  # 유틸
  equatable: ^2.0.7
  dartz: ^0.10.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # 코드 생성
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.5
  # hive_generator: ^2.0.1  # riverpod_generator와 충돌로 비활성화

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

