<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#7CC47E"/>
      <stop offset="100%" style="stop-color:#52A855"/>
    </linearGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#1A5C1A" flood-opacity="0.25"/>
    </filter>
    <filter id="heartShadow">
      <feDropShadow dx="4" dy="10" stdDeviation="12" flood-color="#1A5C1A" flood-opacity="0.3"/>
    </filter>
    <filter id="ecgShadow">
      <feDropShadow dx="3" dy="10" stdDeviation="8" flood-color="#6B0000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="72" y="72" width="880" height="880" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Icon background -->
  <g filter="url(#iconShadow)">
    <rect x="72" y="72" width="880" height="880" rx="200" ry="200" fill="url(#bgGrad)"/>
  </g>


  <!-- Heart outline (white, thick stroke, shadow) -->
  <g filter="url(#heartShadow)" clip-path="url(#iconClip)">
    <path d="
      M512 740
      C460 700 220 570 220 390
      C220 288 296 210 390 210
      C444 210 492 238 512 272
      C532 238 580 210 634 210
      C728 210 804 288 804 390
      C804 570 564 700 512 740 Z
    "
    fill="none"
    stroke="white"
    stroke-width="58"
    stroke-linejoin="round"
    />
  </g>

  <!-- ECG line (dark red) with shadow, clipped to icon -->
  <g filter="url(#ecgShadow)" clip-path="url(#iconClip)">
    <!-- Main ECG: flat → sharp spike → flat → S-curve tail -->
    <path d="
      M 160 470
      L 330 470
      L 375 330
      L 415 610
      L 450 280
      L 490 510
      L 525 470
      L 580 470
      C 630 470 650 430 680 390
      C 710 350 730 420 760 460
      C 790 500 820 440 870 430
    "
    fill="none"
    stroke="#B71C1C"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    />
  </g>
</svg>
